en:
  super_admin:
    navigation:
      logo_alt: "ViperChat Admin Dashboard"
      console: "Super Admin Console"
      dashboard: "Dashboard"
      installation_configs: "Installation configuration"
      settings: "Settings"
      sidekiq_dashboard: "Sidekiq Dashboard"
      instance_health: "Instance Health"
      push_diagnostics: "Push Diagnostics"
      agent_dashboard: "Agent Dashboard"
      logout: "Logout"
    dashboard:
      title: "Admin Dashboard"
      accounts: "Accounts"
      users: "Users"
      inboxes: "Inboxes"
      conversations: "Conversations"
    app_configs:
      title: "Configure Settings - %{config}"
      true: "True"
      false: "False"
      submit: "Submit"
    instance_statuses:
      title: "Instance Status"
      metric: "Metric"
      value: "Value"
    captain_model_overrides:
      form:
        helper_text: "Leave a model blank to use the YAML default for that AI feature."
        use_default: "Use default: %{model} (%{model_id})"
      show:
        summary: "View model routing"
        provider: "Provider"
        model: "Model"
      sources:
        account_override: "Account override"
        default: "Default"
      features:
        editor: "Editor"
        assistant: "Assistant"
        copilot: "Copilot"
        label_suggestion: "Label suggestion"
        document_faq_generation: "Document FAQ generation"
        conversation_faq_generation: "Conversation FAQ generation"
        help_center_article_generation: "Help center article generation"
        onboarding_content_generation: "Onboarding content generation"
        help_center_query_translation: "Help center query translation"
        audio_transcription: "Audio transcription"
        help_center_search: "Help center search"
    push_diagnostics:
      title: "Push Diagnostics"
      description: "Send a test push notification to a specific user's registered devices to diagnose delivery issues. Results show the raw FCM, Web Push, or relay response so you can see exactly what failed."
      user_not_found: "User not found."
      no_subscriptions_to_test: "Select at least one subscription to test."
      no_subscriptions_to_delete: "Select at least one subscription to delete."
      subscriptions_deleted: "Deleted %{count} subscription(s). The user's device(s) will re-register on next app launch."
      lookup:
        title: "1. Look up user"
        placeholder: "user@example.com or numeric user ID"
        submit: "Look up"
        not_found: "No user found for \"%{query}\"."
        accounts: "Accounts"
      subscriptions:
        title: "2. Select subscriptions (%{count})"
        warning: "Warning: This sends a real push to every selected device. Use only when diagnosing a reported issue."
        empty: "This user has no push subscriptions registered."
      notification:
        title: "Title"
        body: "Body"
        customer_warning: "Customers will see this text as a real push notification on their device."
      table:
        type: "Type"
        device_endpoint: "Device / endpoint"
        push_token: "Push token"
        device_details: "Device details"
        created: "Created"
        updated: "Last updated"
        status: "Status"
        details: "Details"
      actions:
        send: "Send Test Push to Selected"
        delete: "Delete Selected Subscriptions"
        delete_confirm: "Delete the selected subscription(s)? The user won't receive pushes on those devices until their app re-registers."
      results:
        title: "3. Results"
        subscription_id: "Sub ID"
        device: "Device"
      statuses:
        success: "Success"
        failure: "Failure"
        skipped: "Skipped"
      time_ago: "%{time} ago"
    settings:
      title: "Settings"
      subtitle: "Update your instance settings, access billing portal"
      alert:
        title: "Alert!"
        message: "Unauthorized premium changes detected in ViperChat. To keep using them, please upgrade your plan. Contact for help:"
      installation_identifier: "Installation Identifier"
      current_plan: "Current plan"
      refresh: "Refresh"
      manage: "Manage"
      license_warning: "You have %{count} agents. Please add more licenses to add more users."
      help:
        title: "Need help?"
        subtitle: "Do you face any issues? We are here to help."
        community_support: "Community Support"
        chat_support: "Chat Support"
      features: "Features"
      upgrade_now: "Upgrade now"
      switch_to_enterprise: "Switch to Enterprise edition"
    accounts:
      seed_data:
        description: "Click the button to generate seed data into this account for demos."
        warning: "Note: This will clear all the existing data in this account."
        submit: "Generate Seed Data"
      reset_cache:
        description_html: "This will clear the IndexedDB cache keys from redis.<br>The next load will fetch the data from backend."
        submit: "Reset Frontend Cache"
    users:
      impersonate:
        warning: "Caution: Any actions executed after impersonate will appear as if performed by the impersonated user - [%{name}]"
        button: "Impersonate user"
    auth:
      title: "SuperAdmin | %{brand}"
      greeting: "Howdy, admin"
      email_label: "Email Address"
      email_placeholder: "Email eg: someone@example.com"
      password_label: "Password"
      password_placeholder: "Password"
      login: "Login"
      invalid_credentials: "Invalid credentials. Please try again."
