pt_BR:
  super_admin:
    navigation:
      logo_alt: "Painel Admin ViperChat"
      console: "Console Super Admin"
      dashboard: "Painel"
      installation_configs: "Configuração de instalação"
      settings: "Configurações"
      sidekiq_dashboard: "Painel do Sidekiq"
      instance_health: "Saúde da instância"
      push_diagnostics: "Diagnóstico de push"
      agent_dashboard: "Painel do agente"
      logout: "Sair"
    dashboard:
      title: "Painel do administrador"
      accounts: "Contas"
      users: "Usuários"
      inboxes: "Caixas de entrada"
      conversations: "Conversas"
    app_configs:
      title: "Configurar ajustes - %{config}"
      true: "Verdadeiro"
      false: "Falso"
      submit: "Salvar"
    instance_statuses:
      title: "Status da instância"
      metric: "Métrica"
      value: "Valor"
    captain_model_overrides:
      form:
        helper_text: "Deixe um modelo em branco para usar o padrão YAML desse recurso de IA."
        use_default: "Usar padrão: %{model} (%{model_id})"
      show:
        summary: "Ver roteamento de modelos"
        provider: "Provedor"
        model: "Modelo"
      sources:
        account_override: "Substituição da conta"
        default: "Padrão"
      features:
        editor: "Editor"
        assistant: "Assistente"
        copilot: "Copiloto"
        label_suggestion: "Sugestão de etiquetas"
        document_faq_generation: "Geração de FAQ de documentos"
        conversation_faq_generation: "Geração de FAQ de conversas"
        help_center_article_generation: "Geração de artigos da central de ajuda"
        onboarding_content_generation: "Geração de conteúdo de integração"
        help_center_query_translation: "Tradução de consultas da central de ajuda"
        audio_transcription: "Transcrição de áudio"
        help_center_search: "Pesquisa na central de ajuda"
    push_diagnostics:
      title: "Diagnóstico de push"
      description: "Envie uma notificação push de teste aos dispositivos registrados de um usuário para diagnosticar problemas de entrega. Os resultados mostram a resposta bruta do FCM, Web Push ou relay para identificar exatamente o que falhou."
      user_not_found: "Usuário não encontrado."
      no_subscriptions_to_test: "Selecione pelo menos uma inscrição para testar."
      no_subscriptions_to_delete: "Selecione pelo menos uma inscrição para excluir."
      subscriptions_deleted: "%{count} inscrição(ões) excluída(s). Os dispositivos do usuário serão registrados novamente na próxima abertura do aplicativo."
      lookup:
        title: "1. Localizar usuário"
        placeholder: "usuario@exemplo.com ou ID numérico"
        submit: "Localizar"
        not_found: "Nenhum usuário encontrado para \"%{query}\"."
        accounts: "Contas"
      subscriptions:
        title: "2. Selecionar inscrições (%{count})"
        warning: "Atenção: isso envia um push real para cada dispositivo selecionado. Use somente ao diagnosticar um problema relatado."
        empty: "Este usuário não possui inscrições de push registradas."
      notification:
        title: "Título"
        body: "Mensagem"
        customer_warning: "O cliente verá este texto como uma notificação push real no dispositivo."
      table:
        type: "Tipo"
        device_endpoint: "Dispositivo / endpoint"
        push_token: "Token de push"
        device_details: "Detalhes do dispositivo"
        created: "Criado em"
        updated: "Última atualização"
        status: "Status"
        details: "Detalhes"
      actions:
        send: "Enviar push de teste aos selecionados"
        delete: "Excluir inscrições selecionadas"
        delete_confirm: "Excluir as inscrições selecionadas? O usuário não receberá pushes nesses dispositivos até que o aplicativo os registre novamente."
      results:
        title: "3. Resultados"
        subscription_id: "ID da inscrição"
        device: "Dispositivo"
      statuses:
        success: "Sucesso"
        failure: "Falha"
        skipped: "Ignorado"
      time_ago: "há %{time}"
    settings:
      title: "Configurações"
      subtitle: "Atualize as configurações da instância e acesse o portal de cobrança"
      alert:
        title: "Alerta!"
        message: "Alterações premium não autorizadas detectadas no ViperChat. Para continuar usando, faça upgrade do seu plano. Contato para ajuda:"
      installation_identifier: "Identificador da instalação"
      current_plan: "Plano atual"
      refresh: "Atualizar"
      manage: "Gerenciar"
      license_warning: "Você tem %{count} agentes. Adicione mais licenças para incluir mais usuários."
      help:
        title: "Precisa de ajuda?"
        subtitle: "Está com algum problema? Estamos aqui para ajudar."
        community_support: "Suporte da comunidade"
        chat_support: "Suporte por chat"
      features: "Recursos"
      upgrade_now: "Fazer upgrade agora"
      switch_to_enterprise: "Mudar para a edição Enterprise"
    accounts:
      seed_data:
        description: "Clique no botão para gerar dados de demonstração nesta conta."
        warning: "Nota: isso vai limpar todos os dados existentes nesta conta."
        submit: "Gerar dados de demonstração"
      reset_cache:
        description_html: "Isso vai limpar as chaves do cache IndexedDB no Redis.<br>O próximo carregamento vai buscar os dados do backend."
        submit: "Limpar cache do frontend"
    users:
      impersonate:
        warning: "Atenção: qualquer ação executada após a personificação aparecerá como se fosse do usuário personificado - [%{name}]"
        button: "Personificar usuário"
    auth:
      title: "SuperAdmin | %{brand}"
      greeting: "Olá, admin"
      email_label: "Endereço de e-mail"
      email_placeholder: "E-mail, ex: alguem@exemplo.com"
      password_label: "Senha"
      password_placeholder: "Senha"
      login: "Entrar"
      invalid_credentials: "Credenciais inválidas. Tente novamente."
