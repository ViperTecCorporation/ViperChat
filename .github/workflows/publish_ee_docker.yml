name: Build Minha Imagem Pessoal
on:
  push:
    branches: [ "4.10.0" ] # Mudamos de master para 4.10.0
  workflow_dispatch:      # Isso cria o botão manual

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile # Indica que a receita está na pasta docker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/chatwoot:latest
